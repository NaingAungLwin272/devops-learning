name: CI Pipeline

on:
    push:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        # "steps" must be indented under the job name (build)
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 18 # Updated to a supported LTS version

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: node test.js
